# Harici ilanlar: Playwright (GitHub runner) → Firestore — ücretli proxy olmadan
# Önerilen: önce Actions sekmesinden "Run workflow" ile manuel deneyin; secret doğrulansın.
# Zamanlama: 3 saatte bir (UTC) — kota tasarrufu. Saatlik için cron: '0 * * * *'
name: External listings ingest (Sahibinden)

on:
  workflow_dispatch:
    inputs:
      city_code:
        description: 'Sahibinden il kodu (a24), örn. 21'
        required: false
        default: '21'
  schedule:
    - cron: '0 */3 * * *' # Her 3 saatte bir UTC (Türkiye kış: +3)

permissions:
  contents: read

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: tools/github_listings_ingest/requirements.txt

      - name: Install Python dependencies
        run: pip install -r tools/github_listings_ingest/requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium

      # MAX_LISTINGS: repo Variables (MAX_LISTINGS) veya varsayılan 30 — zamanlayıcıda inputs yok.
      - name: Run Sahibinden ingest
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          CITY_CODE: ${{ github.event.inputs.city_code || '21' }}
          MAX_LISTINGS: ${{ vars.MAX_LISTINGS || '30' }}
          CITY_NAME: ${{ vars.CITY_NAME || 'Diyarbakır' }}
          DISTRICT_NAME: ${{ vars.DISTRICT_NAME || '' }}
        run: python tools/github_listings_ingest/ingest_sahibinden.py
