# tools/github_listings_ingest — parse testleri (Firebase / Playwright yok)
name: Verify listings ingest (Python)

on:
  push:
    branches: [main, master]
    paths:
      - 'tools/github_listings_ingest/**'
      - '.github/workflows/verify-listings-ingest.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'tools/github_listings_ingest/**'

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/github_listings_ingest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: tools/github_listings_ingest/requirements-dev.txt

      - name: Install deps
        run: pip install -r requirements-dev.txt

      - name: Pytest
        run: python -m pytest tests/ -v --tb=short
