<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="Emlak Master app icon">
  <defs>
    <radialGradient id="bgRadial" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#101828"/>
      <stop offset="50%" stop-color="#06080e"/>
      <stop offset="100%" stop-color="#010203"/>
    </radialGradient>
    <linearGradient id="bgEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1018"/>
      <stop offset="100%" stop-color="#020305"/>
    </linearGradient>
    <linearGradient id="goldMain" x1="20%" y1="6%" x2="80%" y2="94%">
      <stop offset="0%" stop-color="#261808"/>
      <stop offset="16%" stop-color="#523810"/>
      <stop offset="38%" stop-color="#a07828"/>
      <stop offset="52%" stop-color="#d4a838"/>
      <stop offset="62%" stop-color="#f2e0a0"/>
      <stop offset="76%" stop-color="#b89038"/>
      <stop offset="100%" stop-color="#3d2808"/>
    </linearGradient>
    <linearGradient id="goldBevel" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fff8e0" stop-opacity="0.5"/>
      <stop offset="30%" stop-color="#d4a030" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#140c02" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="winGlass" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#fff6d0"/>
      <stop offset="45%" stop-color="#f0c050"/>
      <stop offset="100%" stop-color="#784808"/>
    </linearGradient>
    <linearGradient id="winFrame" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#3a2406"/>
      <stop offset="50%" stop-color="#d8a030"/>
      <stop offset="100%" stop-color="#1a1004"/>
    </linearGradient>
    <filter id="haloGold" x="-28%" y="-28%" width="156%" height="156%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="22" result="b"/>
      <feColorMatrix in="b" type="matrix"
        values="1 0.72 0.28 0 0  0.88 0.52 0.12 0 0  0.35 0.2 0.05 0 0  0 0 0 0.5 0"/>
    </filter>
    <filter id="softBloom" x="-12%" y="-12%" width="124%" height="124%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feColorMatrix in="b" type="matrix"
        values="1 0.75 0.35 0 0  0.75 0.55 0.18 0 0  0.35 0.22 0.08 0 0  0 0 0 0.28 0"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bgEdge)"/>
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bgRadial)" opacity="0.98"/>

  <!-- M + gable roof + bottom chevron; facade cutout (evenodd) -->
  <g filter="url(#haloGold)" opacity="0.88">
    <path fill="#9a7828" fill-rule="evenodd"
          d="M 168 868 L 268 228 L 512 138 L 756 228 L 856 868 L 652 868 L 512 688 L 372 868 Z
             M 392 360 L 632 360 L 608 588 L 416 588 Z"/>
  </g>
  <g filter="url(#softBloom)" opacity="0.5">
    <path fill="url(#goldMain)" fill-rule="evenodd"
          d="M 168 868 L 268 228 L 512 138 L 756 228 L 856 868 L 652 868 L 512 688 L 372 868 Z
             M 392 360 L 632 360 L 608 588 L 416 588 Z"/>
  </g>
  <path fill="url(#goldMain)" fill-rule="evenodd"
        d="M 168 868 L 268 228 L 512 138 L 756 228 L 856 868 L 652 868 L 512 688 L 372 868 Z
           M 392 360 L 632 360 L 608 588 L 416 588 Z"/>
  <path fill="url(#goldBevel)" fill-rule="evenodd" opacity="0.38"
        d="M 168 868 L 268 228 L 512 138 L 756 228 L 856 868 L 652 868 L 512 688 L 372 868 Z
           M 392 360 L 632 360 L 608 588 L 416 588 Z"/>

  <g transform="translate(512, 472)" opacity="0.98">
    <rect x="-52" y="-44" width="104" height="88" rx="6" fill="none" stroke="url(#winFrame)" stroke-width="4"/>
    <line x1="0" y1="-44" x2="0" y2="44" stroke="url(#winFrame)" stroke-width="2.8"/>
    <line x1="-52" y1="0" x2="52" y2="0" stroke="url(#winFrame)" stroke-width="2.8"/>
    <rect x="-50" y="-42" width="48" height="40" rx="3" fill="url(#winGlass)" opacity="0.96"/>
    <rect x="2" y="-42" width="48" height="40" rx="3" fill="url(#winGlass)" opacity="0.9"/>
    <rect x="-50" y="2" width="48" height="40" rx="3" fill="url(#winGlass)" opacity="0.84"/>
    <rect x="2" y="2" width="48" height="40" rx="3" fill="url(#winGlass)" opacity="0.78"/>
  </g>
</svg>
